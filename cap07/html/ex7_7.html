<!--Programa que calcula o ano de nascimento de uma pessoa-->
<meta charset="UTF-8">
<script>
    const anoAtual = new Date().getFullYear();
    const idade = Number(prompt(`Quantos anos Você vai fazer nesse  ano de ${anoAtual} ?: `));
    const AnoNasc = anoAtual - idade;
    alert(`há... você nasceu em ${AnoNasc}`);
</script>
